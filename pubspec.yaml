name: igris
description: A personal productivity and identity-tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Calendar
  table_calendar: ^3.0.9
  
  # Animation — micro-interactions and transitions throughout the UI
  flutter_animate: ^4.5.0
  # Rive: hero-level system animations (level-up, domain-unlock).
  # Place .riv files in assets/rive/. Widget falls back to flutter_animate
  # glow effects if a file is missing, so the app works without custom assets.
  rive: ^0.13.0
  # Lottie: light celebration overlays (quest complete, milestone).
  # Place .json files in assets/lottie/. Widget falls back to flutter_animate
  # neon effects if a file is missing.
  lottie: ^3.0.0
  # Confetti: rare achievement bursts (level-up, weekly goal, streak).
  # Palette-based particles — no bright rainbow defaults.
  confetti: ^0.7.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.2.1

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.0   # Restore backup: lets user pick .json from device
  path_provider: ^2.1.2

  # Responsive layout — wraps root with breakpoint-aware builder
  responsive_framework: ^1.4.0

  # Progress / XP visuals — circular and linear percent indicators
  percent_indicator: ^4.2.3

  # Premium fonts — Orbitron (rank/level display) + Rajdhani (UI text)
  google_fonts: ^6.1.0

  # Premium component library (shadcn/ui Flutter port)
  # Used for: Cards, Buttons, Dialogs, Inputs, Bottom sheets
  shadcn_ui: ^0.50.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Hive Generator
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - web/icons/
    # Rive hero animations — drop .riv files here to replace flutter_animate fallbacks
    - assets/rive/
    # Lottie celebration overlays — drop .json files here to replace fallbacks
    - assets/lottie/
